<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>newsarchive — Snapshot Viewer</title>
  <style>
    * { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-size: 16px;
      color: #8b949e;
    }
    .error {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-size: 16px;
      color: #f85149;
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
  </style>
</head>
<body>
  <div id="content" class="loading">Loading snapshot...</div>
  <script src="viewer.js" type="module"></script>
</body>
</html>
